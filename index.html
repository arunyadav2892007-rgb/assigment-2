<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 25px;
            color: #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        h3 {
            margin-bottom: 15px;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        button {
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
        }

        .clear-btn {
            margin-top: 10px;
            background: rgba(255,0,0,0.6);
        }

        @media (max-width: 700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>

                <br><br>

                <h3>Search History</h3>
                <div class="history" id="history"></div>
                <button class="clear-btn" onclick="clearHistory()">Clear History</button>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = "7b90046cbc7e7cd214187163b60bfe1b";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );

            if (!res.ok) {
                throw new Error("City not found");
            }

            return await res.json();
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
                <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
            `;
        }

        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            if (!history.includes(city)) {
                history.unshift(city);
            }

            history = history.slice(0, 8);

            localStorage.setItem("weatherHistory", JSON.stringify(history));

            showHistory();
        }

        function showHistory() {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            historyBox.innerHTML = "";

            history.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;

                btn.onclick = () => {
                    cityInput.value = city;
                    search(city);
                };

                historyBox.appendChild(btn);
            });
        }

        function clearHistory() {
            localStorage.removeItem("weatherHistory");
            showHistory();
        }

        async function search(city) {
            weatherBox.innerHTML = "Loading...";

            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
                cityInput.value = "";
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        showHistory();
    </script>

</body>

</html>
